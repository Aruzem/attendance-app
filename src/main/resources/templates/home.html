<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h1 class="text-center mb-4">勤怠システム</h1>

        <h4>現在の状態</h4>
        <p class="fs-4 fw-bold" th:text="${status}"></p>

        <h4>勤務時間</h4>
        <p class="fs-4 text-primary" th:text="${workTime}"></p>

    </div>

</div>

<div th:if="${status == '未出勤'}" class="mt-3">
    <form action="/clock-in" method="post">
        <button class="btn btn-success w-100 btn-lg">出勤</button>
    </form>
</div>

<div th:if="${status == '勤務中'}" class="mt-3">
    <form action="/break-start" method="post" class="mb-2">
        <button class="btn btn-warning w-100 btn-lg">中抜け開始</button>
    </form>
    <form action="/clock-out" method="post">
        <button class="btn btn-danger w-100 btn-lg">退勤</button>
    </form>
</div>

<div th:if="${status == '中抜け中'}" class="mt-3">
    <form action="/break-end" method="post">
        <button class="btn btn-primary w-100 btn-lg">中抜け終了</button>
    </form>
</div>

<div th:if="${status == '退勤済み'}" class="mt-3 text-center">
    <p class="text-muted">本日の勤務は終了しています</p>
</div>

</body>
